<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      <header class="topbar glass">
        <div class="wordmark">
          <span class="wordmark-text">ARCA</span>
          <span class="wordmark-dot" aria-hidden="true"></span>
        </div>
        <div class="topbar-controls">
          <label class="select-field">
            <span class="visually-hidden">Environment</span>
            <select id="hdri-select" class="select-quiet" aria-label="Environment">
              <option value="studio">Studio</option>
              <option value="outdoor">Outdoor</option>
              <option value="museum">Museum</option>
            </select>
          </label>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </div>
      </header>
      <canvas id="stage"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
