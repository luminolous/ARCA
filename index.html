<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      <header class="topbar glass">
        <div class="wordmark">
          <span class="wordmark-text">ARCA</span>
          <span class="wordmark-dot" aria-hidden="true"></span>
        </div>
        <div class="topbar-controls">
          <button type="button" id="compare-toggle" class="btn-quiet" aria-pressed="false">Compare</button>
          <label class="select-field">
            <span class="visually-hidden">Environment</span>
            <select id="hdri-select" class="select-quiet" aria-label="Environment">
              <option value="studio">Studio</option>
              <option value="outdoor">Outdoor</option>
              <option value="museum">Museum</option>
            </select>
          </label>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </div>
      </header>
      <button type="button" id="gallery-toggle" class="rail-toggle rail-toggle-left" aria-label="Collapse gallery" aria-expanded="true">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 6 9 12 15 18"/>
        </svg>
      </button>
      <button type="button" id="inspect-toggle" class="rail-toggle rail-toggle-right" aria-label="Collapse inspect" aria-expanded="true">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 6 15 12 9 18"/>
        </svg>
      </button>
      <canvas id="stage"></canvas>
      <div id="pane-label-left" class="pane-label" hidden></div>
      <canvas id="stage2" hidden></canvas>
      <div id="pane-controls-right" class="pane-controls" hidden>
        <label class="select-field">
          <span class="visually-hidden">Second model</span>
          <select id="model2-select" class="select-quiet" aria-label="Second model"></select>
        </label>
        <div id="pane-label-right" class="pane-label"></div>
      </div>
      <aside id="gallery-rail" class="gallery-rail glass" aria-label="Gallery">
        <h2 class="panel-heading">Gallery</h2>
        <div class="panel-divider"></div>
      </aside>
      <footer id="bottom-bar" class="bottom-bar">
        <div id="metadata-pills" class="metadata-pills"></div>
        <button type="button" id="screenshot-btn" class="btn-primary" disabled aria-label="Screenshot">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 8h3l2-2h6l2 2h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/>
            <circle cx="12" cy="13" r="3.5"/>
          </svg>
          <span>Capture</span>
        </button>
      </footer>
      <aside id="inspect-panel" class="inspect-panel glass" aria-label="Inspect">
        <h2 class="panel-heading">Inspect</h2>
        <div class="panel-divider"></div>
        <div class="inspect-buttons">
          <button type="button" class="btn-quiet" data-mode="lit" aria-pressed="false">Lit</button>
          <button type="button" class="btn-quiet" data-mode="wireframe" aria-pressed="false">Wireframe</button>
          <button type="button" class="btn-quiet" data-mode="basecolor" aria-pressed="false">Base color</button>
          <button type="button" class="btn-quiet" data-mode="normal-vec" aria-pressed="false">Normal vector</button>
          <button type="button" class="btn-quiet" data-mode="normal-map" aria-pressed="false">Normal map</button>
          <button type="button" class="btn-quiet" data-mode="roughness" aria-pressed="false">Roughness</button>
        </div>
        <div class="panel-divider"></div>
        <div id="display-gui" class="display-gui"></div>
        <div id="compare-controls" class="compare-controls" hidden>
          <div class="panel-divider"></div>
          <label class="sync-toggle">
            <input type="checkbox" id="sync-toggle" checked>
            <span>Sync cameras</span>
          </label>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
